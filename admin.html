<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – ReservaLab USM</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── VARIABLES & RESET ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0a0c14;
      --bg2:      #111422;
      --bg3:      #181c2e;
      --surface:  #1e2235;
      --surface2: #252a40;
      --border:   #2e3352;
      --text:     #e8eaf6;
      --muted:    #8890b5;
      --accent:   #6c63ff;
      --accent2:  #a78bfa;
      --laser:    #ff4e6a;
      --cnc:      #00d4aa;
      --success:  #10b981;
      --warning:  #f59e0b;
      --error:    #ef4444;
      --radius:   14px;
      --radius-sm:8px;
      --shadow:   0 8px 32px rgba(0,0,0,.45);
      --trans:    .22s cubic-bezier(.4,0,.2,1);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── LOGIN SCREEN ───────────────────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 70% 60% at 50% -10%, rgba(108,99,255,.3) 0%, transparent 70%),
        var(--bg);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .login-icon { font-size: 3rem; margin-bottom: 12px; }
    .login-title {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .login-sub { font-size: .85rem; color: var(--muted); margin-bottom: 32px; }
    .login-input-wrap { position: relative; margin-bottom: 12px; }
    .login-input {
      width: 100%;
      background: var(--bg3);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 13px 48px 13px 16px;
      outline: none;
      transition: border-color var(--trans), box-shadow var(--trans);
      letter-spacing: .1em;
    }
    .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.2); }
    .toggle-pw {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 1.1rem;
      padding: 4px;
    }
    .login-error {
      font-size: .82rem; color: var(--error);
      min-height: 18px; margin-bottom: 12px;
      transition: all var(--trans);
    }
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 50px;
      font-size: .95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all var(--trans);
      box-shadow: 0 4px 20px rgba(108,99,255,.4);
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(108,99,255,.55); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── DASHBOARD ──────────────────────────────────────────── */
    #dashboard { display: none; }

    /* Header */
    .admin-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,12,20,.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .admin-header-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-logo { display: flex; align-items: center; gap: 12px; }
    .admin-logo-icon { font-size: 1.4rem; }
    .admin-logo-title {
      font-size: 1rem; font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .admin-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.35);
      color: #f87171; padding: 3px 10px; border-radius: 50px;
      font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    }
    .btn-logout {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: 7px 16px; border-radius: 50px;
      font-size: .8rem; cursor: pointer; transition: all var(--trans);
      font-family: inherit;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); background: rgba(239,68,68,.08); }

    /* Main */
    .admin-main { max-width: 1400px; margin: 0 auto; padding: 32px 24px 80px; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px;
      display: flex; align-items: center; gap: 16px;
      transition: all var(--trans);
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .stat-icon { font-size: 1.8rem; flex-shrink: 0; }
    .stat-num { font-size: 1.8rem; font-weight: 800; line-height: 1; }
    .stat-label { font-size: .78rem; color: var(--muted); margin-top: 2px; }
    .stat-card.total   .stat-num { color: var(--accent2); }
    .stat-card.attended .stat-num { color: var(--success); }
    .stat-card.noshow  .stat-num { color: var(--error); }
    .stat-card.pending .stat-num { color: var(--warning); }

    /* Filters */
    .filters-row {
      display: flex; flex-wrap: wrap; gap: 12px;
      align-items: center; margin-bottom: 24px;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-label { font-size: .75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
    .filter-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); padding: 6px 14px; border-radius: 50px;
      font-size: .8rem; font-weight: 500; cursor: pointer;
      transition: all var(--trans); font-family: inherit; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: rgba(108,99,255,.2); border-color: var(--accent); color: var(--accent2); font-weight: 600; }
    .filters-right { margin-left: auto; display: flex; gap: 8px; }
    .btn-refresh {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 8px 16px; border-radius: 50px;
      font-size: .82rem; cursor: pointer; transition: all var(--trans); font-family: inherit;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent2); }

    /* Table */
    .table-wrapper { overflow-x: auto; border-radius: var(--radius); }
    .reservations-table {
      width: 100%; border-collapse: collapse;
      background: var(--surface); border-radius: var(--radius); overflow: hidden;
      min-width: 900px;
    }
    .reservations-table th {
      background: var(--bg3); padding: 12px 16px;
      font-size: .72rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted); text-align: left;
      border-bottom: 2px solid var(--border); white-space: nowrap;
    }
    .reservations-table td {
      padding: 13px 16px; border-bottom: 1px solid var(--border);
      font-size: .85rem; vertical-align: middle;
    }
    .reservations-table tr:last-child td { border-bottom: none; }
    .reservations-table tr:hover td { background: rgba(108,99,255,.05); }
    .reservations-table tr.attended-row td { background: rgba(16,185,129,.04); }
    .reservations-table tr.noshow-row td { background: rgba(239,68,68,.04); }

    .email-cell { font-size: .8rem; color: var(--accent2); font-weight: 500; }
    .machine-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 50px; font-size: .72rem; font-weight: 700;
      white-space: nowrap;
    }
    .machine-badge.laser { background: rgba(255,78,106,.15); color: var(--laser); }
    .machine-badge.cnc   { background: rgba(0,212,170,.15); color: var(--cnc); }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 50px; font-size: .72rem; font-weight: 700;
      white-space: nowrap;
    }
    .status-badge.pending  { background: rgba(245,158,11,.15); color: var(--warning); }
    .status-badge.attended { background: rgba(16,185,129,.15); color: var(--success); }
    .status-badge.noshow   { background: rgba(239,68,68,.15); color: var(--error); }

    .actions-cell { display: flex; gap: 6px; flex-wrap: nowrap; }
    .action-btn {
      border: none; border-radius: 50px;
      padding: 5px 11px; font-size: .72rem; font-weight: 700;
      cursor: pointer; transition: all var(--trans); white-space: nowrap;
      font-family: inherit;
    }
    .action-btn.attend  { background: rgba(16,185,129,.15); color: var(--success); }
    .action-btn.attend:hover  { background: var(--success); color: #fff; }
    .action-btn.noshow  { background: rgba(245,158,11,.15); color: var(--warning); }
    .action-btn.noshow:hover  { background: var(--warning); color: #000; }
    .action-btn.cancel  { background: rgba(239,68,68,.12); color: var(--error); }
    .action-btn.cancel:hover  { background: var(--error); color: #fff; }
    .action-btn:disabled { opacity: .4; cursor: not-allowed; }

    .empty-row td {
      text-align: center; padding: 60px 16px;
      color: var(--muted); font-size: .9rem;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 13px 28px; border-radius: 50px;
      font-size: .88rem; font-weight: 500;
      box-shadow: var(--shadow); z-index: 300;
      transition: transform .35s cubic-bezier(.175,.885,.32,1.275), opacity .35s;
      opacity: 0; pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.ok  { border-color: var(--success); color: var(--success); }
    .toast.err { border-color: var(--error);   color: var(--error); }
    .toast.warn{ border-color: var(--warning); color: var(--warning); }

    /* Confirm dialog */
    .confirm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px); z-index: 200;
      display: grid; place-items: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity var(--trans);
    }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }
    .confirm-dialog {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; width: 100%; max-width: 400px;
      text-align: center; box-shadow: var(--shadow);
      transform: scale(.95); transition: transform var(--trans);
    }
    .confirm-overlay.open .confirm-dialog { transform: scale(1); }
    .confirm-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .confirm-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .confirm-msg { font-size: .85rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }
    .btn-cancel-dialog {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 10px 24px; border-radius: 50px;
      font-size: .88rem; cursor: pointer; font-family: inherit; transition: all var(--trans);
    }
    .btn-cancel-dialog:hover { border-color: var(--accent); }
    .btn-confirm-dialog {
      background: var(--error); border: none;
      color: #fff; padding: 10px 24px; border-radius: 50px;
      font-size: .88rem; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all var(--trans);
    }
    .btn-confirm-dialog:hover { opacity: .85; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @media (max-width: 600px) {
      .login-card { padding: 36px 24px; }
      .admin-main { padding: 20px 16px 60px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }
  </style>
</head>
<body>

  <!-- ── LOGIN ────────────────────────────────────────────── -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-icon">🔐</div>
      <h1 class="login-title">Panel Administrador</h1>
      <p class="login-sub">ReservaLab · Universidad Santa María</p>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="login-input-wrap">
          <input
            type="password"
            id="pw-input"
            class="login-input"
            placeholder="Contraseña de administrador"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pw" onclick="togglePw()" id="toggle-pw-btn" title="Mostrar/ocultar">👁️</button>
        </div>
        <div class="login-error" id="login-error"></div>
        <button type="submit" class="btn-login" id="btn-login">Ingresar</button>
      </form>
    </div>
  </div>

  <!-- ── DASHBOARD ─────────────────────────────────────────── -->
  <div id="dashboard">

    <!-- Header -->
    <header class="admin-header">
      <div class="admin-header-inner">
        <div class="admin-logo">
          <span class="admin-logo-icon">⚙️</span>
          <div>
            <span class="admin-logo-title">ReservaLab</span>
          </div>
          <span class="admin-badge">🛡️ Admin</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:.8rem;color:var(--muted)" id="last-update"></span>
          <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <main class="admin-main">

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card total">
          <div class="stat-icon">📋</div>
          <div><div class="stat-num" id="stat-total">–</div><div class="stat-label">Total reservas</div></div>
        </div>
        <div class="stat-card attended">
          <div class="stat-icon">✅</div>
          <div><div class="stat-num" id="stat-attended">–</div><div class="stat-label">Asistieron</div></div>
        </div>
        <div class="stat-card noshow">
          <div class="stat-icon">❌</div>
          <div><div class="stat-num" id="stat-noshow">–</div><div class="stat-label">No asistieron</div></div>
        </div>
        <div class="stat-card pending">
          <div class="stat-icon">⏳</div>
          <div><div class="stat-num" id="stat-pending">–</div><div class="stat-label">Pendientes</div></div>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-row">
        <div class="filter-group">
          <span class="filter-label">Semana</span>
          <button class="filter-btn active" id="fw-all"  onclick="setFilter('week','all')">Todas</button>
          <button class="filter-btn" id="fw-0"   onclick="setFilter('week','0')">Esta</button>
          <button class="filter-btn" id="fw-1"   onclick="setFilter('week','1')">Próxima</button>
        </div>
        <div class="filter-group">
          <span class="filter-label">Máquina</span>
          <button class="filter-btn active" id="fm-all"   onclick="setFilter('machine','all')">Todas</button>
          <button class="filter-btn" id="fm-laser" onclick="setFilter('machine','laser')">🔴 Láser</button>
          <button class="filter-btn" id="fm-cnc"   onclick="setFilter('machine','cnc')">🔩 CNC</button>
        </div>
        <div class="filter-group">
          <span class="filter-label">Estado</span>
          <button class="filter-btn active" id="fs-all"      onclick="setFilter('status','all')">Todos</button>
          <button class="filter-btn" id="fs-pending"   onclick="setFilter('status','pending')">Pendiente</button>
          <button class="filter-btn" id="fs-attended"  onclick="setFilter('status','attended')">Asistió</button>
          <button class="filter-btn" id="fs-noshow"    onclick="setFilter('status','noshow')">No asistió</button>
        </div>
        <div class="filters-right">
          <button class="btn-refresh" onclick="refreshData()">🔄 Actualizar</button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <table class="reservations-table" id="reservations-table">
          <thead>
            <tr>
              <th>Correo</th>
              <th>Máquina</th>
              <th>Bloque</th>
              <th>Día</th>
              <th>Horario</th>
              <th>Ayudante</th>
              <th>Semana</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr class="empty-row"><td colspan="9"><span class="spinner"></span> Cargando...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- ── CONFIRM DIALOG ────────────────────────────────────── -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-dialog">
      <div class="confirm-icon" id="c-icon">🗑️</div>
      <div class="confirm-title" id="c-title">¿Cancelar reserva?</div>
      <div class="confirm-msg" id="c-msg"></div>
      <div class="confirm-actions">
        <button class="btn-cancel-dialog" onclick="closeConfirm()">Cancelar</button>
        <button class="btn-confirm-dialog" id="btn-confirm-action">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ─────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script src="admin.js"></script>
</body>
</html>
